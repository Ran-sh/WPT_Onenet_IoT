<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WPT 无线充电 - 控制</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="js/config.js"></script>
    <script src="js/onenet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #030712; color: #e5e7eb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 14px 18px; margin: 4px 16px;
            background: #111827; border: 1px solid #1f2937; border-radius: 10px;
        }
        .row-label { font-size: 14px; color: #9ca3af; }
        .row-val { font-size: 28px; font-weight: 700; }
        .row-unit { font-size: 14px; color: #6b7280; margin-left: 2px; }
        .text-cyan { color: #22d3ee; }
        .text-green { color: #4ade80; }
        .text-yellow { color: #facc15; }
        .text-red { color: #ef4444; }
        .text-gray { color: #6b7280; }

        .toggle-label { display: block; width: 52px; height: 28px; background: #374151; border-radius: 14px; position: relative; cursor: pointer; transition: background .3s; }
        .toggle-label::after { content:''; position:absolute; top:2px; left:2px; width:24px; height:24px; background:#fff; border-radius:12px; transition: transform .3s; }
        .toggle-checkbox:checked + .toggle-label { background: #4ade80; }
        .toggle-checkbox:checked + .toggle-label::after { transform: translateX(24px); }

        .btn {
            display: block; width: calc(100% - 32px); margin: 8px 16px; padding: 14px;
            border-radius: 12px; font-size: 16px; font-weight: 700; text-align: center;
            border: none; cursor: pointer;
        }
        .btn-start { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.5); color: #f87171; }
        .btn-stop  { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.5); color: #4ade80; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 状态栏 -->
    <div class="flex justify-between items-center px-4 py-4 border-b border-gray-800">
        <span class="text-lg font-semibold">WPT Monitor</span>
        <div class="flex items-center gap-2">
            <span id="connDot" class="w-2 h-2 rounded-full bg-red-500"></span>
            <span id="connText" class="text-xs text-gray-400">未连接</span>
        </div>
    </div>

    <!-- 数据行 -->
    <div class="row">
        <span class="row-label">电压</span>
        <span><span id="valV" class="row-val text-cyan">--</span><span class="row-unit">V</span></span>
    </div>
    <div class="row">
        <span class="row-label">电流</span>
        <span><span id="valI" class="row-val text-cyan">--</span><span class="row-unit">A</span></span>
    </div>
    <div class="row">
        <span class="row-label">频率</span>
        <span><span id="valF" class="row-val text-cyan">--</span><span class="row-unit">kHz</span></span>
    </div>

    <!-- 启停开关 -->
    <div class="row">
        <span class="row-label">启停控制</span>
        <input type="checkbox" id="toggleSwitch" class="toggle-checkbox absolute opacity-0 pointer-events-none" onchange="onSwitchToggle()">
        <label for="toggleSwitch" class="toggle-label"></label>
    </div>

    <!-- 频率设置 -->
    <div class="row">
        <span class="row-label">频率设置</span>
        <span class="flex items-center gap-2">
            <input type="number" id="setFreqVal" min="95" max="150" step="1" value="100"
                class="w-16 bg-transparent border border-gray-600 rounded-lg px-2 py-1 text-center text-cyan text-lg font-bold focus:outline-none focus:border-cyan-500">
            <span class="text-xs text-gray-500">kHz</span>
            <button onclick="onSetFreq()" class="px-4 py-1.5 bg-cyan-500/20 border border-cyan-500/40 rounded-lg text-cyan-400 text-sm font-bold">确认</button>
        </span>
    </div>

    <script>
        const model = getDataModel();
        let conn = false;

        function setConn(ok) {
            conn = ok;
            document.getElementById('connDot').className = 'w-2 h-2 rounded-full ' + (ok ? 'bg-green-500' : 'bg-red-500');
            document.getElementById('connText').textContent = ok ? '已连接' : '未连接';
        }

        async function sync() {
            try {
                const data = await OneNetService.getLatestData();
                setConn(true);
                if (data.voltage !== undefined) document.getElementById('valV').textContent = Number(data.voltage).toFixed(2);
                if (data.current !== undefined) document.getElementById('valI').textContent = Number(data.current).toFixed(2);
                if (data.freq !== undefined) document.getElementById('valF').textContent = data.freq;
                if (data.switch !== undefined) document.getElementById('toggleSwitch').checked = data.switch;
            } catch(e) {
                setConn(false);
            }
        }

        async function onSwitchToggle() {
            const v = document.getElementById('toggleSwitch').checked;
            try { await OneNetService.setProperty({ switch: v }); } catch {}
        }

        async function onSetFreq() {
            const v = parseInt(document.getElementById('setFreqVal').value);
            if (isNaN(v) || v < 95 || v > 150) return;
            try { await OneNetService.setProperty({ setfreq: v }); } catch {}
        }

        sync();
        setInterval(sync, 3000);
    </script>
    <script src="js/mobile-nav.js"></script>
</body>
</html>
